name: SwiftLens
options:
  bundleIdPrefix: me.whynbnb
  deploymentTarget:
    macOS: "12.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.5"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    PRODUCT_BUNDLE_IDENTIFIER: me.whynbnb.SwiftLens
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: SwiftLens/Info.plist
    CODE_SIGN_ENTITLEMENTS: SwiftLens/SwiftLens.entitlements
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    DEVELOPMENT_TEAM: ""
    PRODUCT_NAME: SwiftLens

targets:
  SwiftLens:
    type: application
    platform: macOS
    sources:
      - path: Sources/SwiftLens
    info:
      path: SwiftLens/Info.plist
      properties:
        CFBundleDisplayName: SwiftLens
        CFBundleName: SwiftLens
        CFBundleIdentifier: me.whynbnb.SwiftLens
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundlePackageType: APPL
        CFBundleExecutable: SwiftLens
        CFBundleInfoDictionaryVersion: "6.0"
        LSMinimumSystemVersion: "12.0"
        LSUIElement: false
        NSHighResolutionCapable: true
        LSRequiresNativeExecution: true
    entitlements:
      path: SwiftLens/SwiftLens.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.cs.allow-jit: true
        com.apple.security.cs.allow-unsigned-executable-memory: true
        com.apple.security.cs.disable-library-validation: true
